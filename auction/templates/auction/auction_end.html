{% extends 'base.html' %}
{% block title %}Create Default Notice{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-xl shadow-lg p-6">
        <h2 class="text-xl font-bold mb-4">Create Default Notice</h2>
        <form method="post">
            {% csrf_token %}
            <div class="space-y-3">
                <div>
                    <label class="block text-sm font-medium">Days Overdue</label>
                    <input type="number" name="days_overdue" value="{{ days_overdue }}" readonly class="w-full px-3 py-2 border rounded bg-gray-100">
                </div>
                <div>
                    <label class="block text-sm font-medium">Response Deadline</label>
                    <input type="date" name="response_deadline" required class="w-full px-3 py-2 border rounded">
                </div>
            </div>
            <div class="flex justify-end space-x-2 mt-4">
                <a href="{% url 'auction:notices' %}" class="px-4 py-2 border rounded">Cancel</a>
                <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded">Create Notice</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block title %}Delete User{% endblock %}

{% block content %}
<div class="max-w-md mx-auto fade-in">
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg overflow-hidden">
        <div class="bg-red-600 px-6 py-4">
            <h2 class="text-xl font-bold text-white">Delete User</h2>
        </div>
        
        <div class="p-6 text-center">
            <div class="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-exclamation-triangle text-red-600 text-3xl"></i>
            </div>
            
            <h3 class="text-lg font-semibold text-gray-800 dark:text-white mb-2">Are you sure?</h3>
            <p class="text-gray-600 dark:text-gray-400 mb-4">
                You are about to delete user <strong>{{ user.full_name }}</strong> ({{ user.username }}).
                This action cannot be undone.
            </p>
            
            <form method="post">
                {% csrf_token %}
                <div class="flex space-x-3">
                    <a href="{% url 'users:user_detail' user.id %}" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg text-gray-700 text-center hover:bg-gray-50 transition">
                        Cancel
                    </a>
                    <button type="submit" class="flex-1 px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition">
                        <i class="fas fa-trash mr-2"></i>Delete
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
